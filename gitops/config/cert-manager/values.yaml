# cert-manager — issues TLS certs for the ingress hosts from a local CA
# (gitops/config/cert-manager-issuers). CRDs installed with the chart.
crds:
  enabled: true

# Expose Prometheus metrics (:9402) + a ServiceMonitor so kube-prometheus-stack
# scrapes cert-manager (feeds the cert-manager Grafana dashboard).
prometheus:
  enabled: true
  servicemonitor:
    enabled: true

replicaCount: 1
resources:
  requests: { cpu: 25m, memory: 64Mi }
  limits: { cpu: 100m, memory: 192Mi }

webhook:
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 128Mi }

cainjector:
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 100m, memory: 192Mi }
