# 1) A self-signed issuer used only to mint the root CA.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: argocd
spec:
  selfSigned: {}
---
# 2) The local root CA certificate (stored in {{ .Values.caSecretName }}).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ca
  namespace: {{ .Values.caNamespace }}
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: argocd
spec:
  isCA: true
  commonName: platform-local-ca
  secretName: {{ .Values.caSecretName }}
  duration: 87600h # 10y
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# 3) The CA ClusterIssuer app ingresses reference to get leaf certs.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.clusterIssuerName }}
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: argocd
spec:
  ca:
    secretName: {{ .Values.caSecretName }}
