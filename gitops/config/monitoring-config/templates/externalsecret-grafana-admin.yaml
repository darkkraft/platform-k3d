# Grafana admin credentials from Vault via ESO (consumed by kube-prometheus-stack
# grafana.admin.existingSecret). Vault value seeded by the TF services layer.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.grafana.adminSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "monitoring-config.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.grafana.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.grafana.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.grafana.adminSecretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          {{- include "monitoring-config.labels" . | nindent 10 }}
      data:
        admin-user: "{{ "{{ .username }}" }}"
        admin-password: "{{ "{{ .password }}" }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.grafana.vaultKey }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.grafana.vaultKey }}
        property: password
