{{- range .Values.services }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .secretName }}
  labels:
    {{- include "secret-store.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.clusterSecretStore.name }}
    kind: ClusterSecretStore
  target:
    name: {{ .secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      # basic-auth for CNPG's managed-role passwordSecret; the DB_* keys feed the
      # app container via envFrom. One Secret, both consumers.
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          {{- include "secret-store.labels" $ | nindent 10 }}
      data:
        username: "{{ "{{ .username }}" }}"
        password: "{{ "{{ .password }}" }}"
        DB_USER: "{{ "{{ .username }}" }}"
        DB_PASSWORD: "{{ "{{ .password }}" }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .vaultKey }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .vaultKey }}
        property: password
{{- end }}
