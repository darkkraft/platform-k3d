apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  name: http
