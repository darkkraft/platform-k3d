{{- if .Values.grafanaWidget.enabled }}
# Grafana live-widget credentials: Vault -> ESO -> k8s Secret, exposed to the
# portal pod as HOMEPAGE_VAR_* env (server-side only, never sent to browsers).
# Reuses the same scoped Vault read policy the monitoring stack uses.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.grafanaWidget.secretName }}
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.grafanaWidget.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.grafanaWidget.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          {{- include "portal.labels" . | nindent 10 }}
      data:
        HOMEPAGE_VAR_GRAFANA_USER: "{{ "{{ .username }}" }}"
        HOMEPAGE_VAR_GRAFANA_PASSWORD: "{{ "{{ .password }}" }}"
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.grafanaWidget.vaultKey }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.grafanaWidget.vaultKey }}
        property: password
{{- end }}
