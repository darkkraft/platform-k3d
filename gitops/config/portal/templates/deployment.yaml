apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  labels:
    {{- include "portal.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "portal.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: portal
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Seed our config into a WRITABLE emptyDir. Homepage copies its skeleton
      # files (docker.yaml, custom.css, …) into /app/config on startup; a
      # read-only ConfigMap mount there fails with EROFS and drops the app to
      # demo content. So we copy our files in here and leave the dir writable.
      initContainers:
        - name: seed-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "cp /config-src/*.yaml /app/config/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: config-src
              mountPath: /config-src
      containers:
        - name: homepage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: {{ .Values.allowedHosts | quote }}
            - name: LOG_TARGETS
              value: stdout
          {{- if .Values.grafanaWidget.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.grafanaWidget.secretName }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
          # Probes hit the pod IP, which homepage's host validation would 400 —
          # send the allowed Host header explicitly.
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.ingress.host }}
            initialDelaySeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.ingress.host }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # Writable so homepage can write its skeleton files; seeded from
        # config-src by the initContainer.
        - name: config
          emptyDir: {}
        - name: config-src
          configMap:
            name: portal-config
        - name: cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
